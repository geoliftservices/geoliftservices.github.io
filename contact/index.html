<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | GeoLift</title>

<link rel="icon"
href="https://image2url.com/r2/default/images/1772264544525-e1f6eb99-70f8-4f4b-a3b2-80f37302ffd6.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f8fafc;color:#0f172a;line-height:1.7;}
a{text-decoration:none;color:inherit}

/* ================= HEADER ================= */

header{
position:fixed;
top:0;left:0;width:100%;
background:rgba(255,255,255,0.9);
box-shadow:0 8px 30px rgba(0,0,0,0.08);
z-index:9999;
}

.container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 20px;
}

.logo img{height:42px;}

nav{
display:flex;
align-items:center;
gap:30px;
}

nav a{
font-size:15px;
font-weight:500;
color:#1e293b;
}

nav a:hover{color:#6366f1;}

.cta{
padding:10px 22px;
background:#6366f1;
color:#fff;
border-radius:30px;
font-weight:600;
}

/* Mobile */
.menu-toggle{display:none;}

@media(max-width:992px){
nav{display:none;}
.menu-toggle{display:block;font-size:24px;cursor:pointer;}
}

.spacer{height:90px;}

/* ================= CONTACT SECTION ================= */

.contact-section{
padding:120px 20px;
text-align:center;
}

.contact-container{
max-width:800px;
margin:auto;
}

.contact-section h1{
font-size:42px;
font-weight:800;
margin-bottom:15px;
}

.contact-section p{
color:#64748b;
margin-bottom:40px;
}

form{
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

input, textarea{
width:100%;
padding:14px;
margin:12px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:700;
color:white;
background:linear-gradient(45deg,#6366f1,#8b5cf6);
cursor:pointer;
}

/* ================= FOOTER ================= */

.footer{
background:linear-gradient(135deg,#f8faff,#eef2ff);
padding:60px 20px;
margin-top:100px;
text-align:center;
border-top:1px solid #e5e7ff;
}

.footer img{height:40px;margin-bottom:20px;}

.footer p{
font-size:14px;
color:#64748b;
margin-bottom:10px;
}

.footer-bottom{
margin-top:30px;
font-size:13px;
color:#6b7280;
}

</style>

</head>
<body>

<!-- HEADER -->

<header>
<div class="container">

<div class="logo">
<a href="https://geolift.co.in/">
<img src="https://image2url.com/r2/default/images/1772265884248-84b6840b-e365-486c-8105-67b21889dfea.png">
</a>
</div>

<nav>
<a href="https://geolift.co.in/">Home</a>
<a href="https://geolift.co.in/about/">About</a>
<a href="https://geolift.co.in/services/">Services</a>
<a href="https://geolift.co.in/blog/">Blog</a>
<a href="https://geolift.co.in/contact/">Contact</a>
<a href="tel:+919330629573" class="cta">Free Consultation</a>
</nav>

</div>
</header>

<div class="spacer"></div>

<!-- CONTACT SECTION -->

<section class="contact-section">

<div class="contact-container">

<h1>Request a Consultation</h1>
<p>Tell us about your business and we’ll guide you on improving your Google Maps visibility.</p>

<form onsubmit="sendWhatsApp(); return false;">

<input id="name" placeholder="Your Name" required>
<input id="phone" placeholder="Phone Number" required>
<textarea id="msg" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</section>

<!-- FOOTER -->

<footer class="footer">

<img src="https://image2url.com/r2/default/images/1772265884248-84b6840b-e365-486c-8105-67b21889dfea.png">

<p>Independent Google Business Profile Consulting</p>
<p>📞 +91 9330629573</p>
<p>✉ contact.geolift@gmail.com</p>

<div class="footer-bottom">
© 2026 GeoLift. All Rights Reserved.
</div>

</footer>

<script>
function sendWhatsApp(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let msg=document.getElementById("msg").value;

let text=`New Enquiry:%0AName: ${name}%0APhone: ${phone}%0AMessage: ${msg}`;
window.open("https://wa.me/919330629573?text="+text,"_blank");
}
</script>

</body>
</html>
