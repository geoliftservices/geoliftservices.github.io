<!-- ===== HEADER START ===== -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== HEADER BASE ===== */

header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(255,255,255,0.55);
transition:all .3s ease;
z-index:9999;
}

header.scrolled{
background:rgba(255,255,255,0.9);
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

.container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 20px;
}

/* LOGO */
.logo img{
height:42px;
display:block;
}

/* NAV */
nav{
display:flex;
align-items:center;
gap:30px;
}

nav a{
text-decoration:none;
color:#1e293b;
font-size:15px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#6366f1;
}

.cta{
padding:10px 22px;
background:#6366f1;
color:#fff !important;
border-radius:30px;
font-weight:600;
}

/* MOBILE MENU */
.menu-toggle{
display:none;
flex-direction:column;
gap:6px;
cursor:pointer;
}

.menu-toggle span{
width:26px;
height:3px;
background:#1e293b;
border-radius:3px;
}

/* Responsive */
@media(max-width:992px){

nav{
position:fixed;
top:0;
right:-100%;
width:280px;
height:100vh;
background:#fff;
flex-direction:column;
align-items:flex-start;
padding:90px 30px 40px;
gap:22px;
transition:.4s ease;
}

nav.active{
right:0;
}

.menu-toggle{
display:flex;
}

}

</style>

<header id="header">
<div class="container">

<div class="logo">
<img src="https://image2url.com/r2/default/images/1772265884248-84b6840b-e365-486c-8105-67b21889dfea.png">
</div>

<nav id="menu">
<a href="index.html">Home</a>
<a href="#services">Services</a>
<a href="#">About</a>
<a href="#">Blog</a>
<a href="#contact">Contact</a>
<a href="tel:+919330629573" class="cta">Get Free Consultation</a>
</nav>

<div class="menu-toggle" id="toggle">
<span></span>
<span></span>
<span></span>
</div>

</div>
</header>

<script>
const menu = document.getElementById("menu");
const toggle = document.getElementById("toggle");
const header = document.getElementById("header");

toggle.addEventListener("click", ()=>{
menu.classList.toggle("active");
});

window.addEventListener("scroll", function(){
if(window.scrollY > 50){
header.classList.add("scrolled");
}else{
header.classList.remove("scrolled");
}
});
</script>

<!-- Spacer -->
<div style="height:90px;"></div>

<!-- ===== HEADER END ===== -->
