<!-- ===== PREMIUM GLASS HEADER WITH SCROLL EFFECT ===== -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;}

/* ===== HEADER BASE ===== */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(255,255,255,0.55);
transition:all .3s ease;
z-index:9999;
}

header.scrolled{
background:rgba(255,255,255,0.9);
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

/* ADD REST OF YOUR HEADER CSS HERE */

</style>


<header id="header">
<div class="container">

<div class="logo">
<img src="https://image2url.com/r2/default/images/1772265884248-84b6840b-e365-486c-8105-67b21889dfea.png">
</div>

<nav id="menu">
<a href="#">Home</a>

<div class="dropdown">
  <a href="#services" class="dropbtn">
    Services <span class="arrow">▾</span>
  </a>

  <div class="dropdown-content">
    <a href="#services">Google Business Profile Setup</a>
    <a href="#services">Google Maps Ranking</a>
    <a href="#services">Advanced Local SEO</a>
    <a href="#services">Lead Generation Strategy</a>
    <a href="#services">SEO-Optimized Website Development</a>
  </div>
</div>

<a href="#">About</a>
<a href="#">Case Studies</a>
<a href="#">Blog</a>
<a href="#contact">Contact</a>
<a href="tel:+919330629573" class="cta">Get Free Consultation</a>
</nav>

<div class="menu-toggle" id="toggle">
<span></span>
<span></span>
<span></span>
</div>

</div>
</header>

<div class="menu-overlay" id="overlay"></div>


<script>
document.addEventListener("DOMContentLoaded", function(){

const menu = document.getElementById("menu");
const toggle = document.getElementById("toggle");
const overlay = document.getElementById("overlay");
const header = document.getElementById("header");

if(toggle){
toggle.addEventListener("click", ()=>{
menu.classList.toggle("active");
overlay.classList.toggle("active");
toggle.classList.toggle("active");
});
}

if(overlay){
overlay.addEventListener("click", ()=>{
menu.classList.remove("active");
overlay.classList.remove("active");
toggle.classList.remove("active");
});
}

window.addEventListener("scroll", function(){
if(window.scrollY > 50){
header.classList.add("scrolled");
}else{
header.classList.remove("scrolled");
}
});

});
</script>
